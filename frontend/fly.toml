app = "radius-frontend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  # NEXT_PUBLIC_* переменные — через fly secrets set (доступны при сборке)

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[checks]]
  name = "health"
  port = 3000
  type = "http"
  interval = "10s"
  timeout = "5s"
  grace_period = "5s"
  method = "get"
  path = "/"
  [checks.headers]
    Host = "radius-frontend.fly.dev"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

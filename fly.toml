app = "radius-backend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  # Секреты устанавливаются через: fly secrets set

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[checks]]
  name = "health"
  port = 8000
  type = "http"
  interval = "10s"
  timeout = "5s"
  grace_period = "5s"
  method = "get"
  path = "/health"
  [checks.headers]
    Host = "radius-backend.fly.dev"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

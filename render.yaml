services:
  # ── Backend (FastAPI + Docker) ─────────────────────────────
  - type: web
    name: radius-backend
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app,https://web.telegram.org
      # ⚠️  ЗАМЕНИТЕ выше на ваш реальный URL с Vercel после деплоя фронтенда!
      #     Пример: https://radius-frontend-abc123.vercel.app,https://web.telegram.org
      # ⚠️  Эти переменные НЕ должны быть в git.
      #     Добавьте их вручную в Render Dashboard → Environment
      #     (значения ниже — только примеры, замените на реальные)
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
    healthCheckPath: /health
    plan: free
